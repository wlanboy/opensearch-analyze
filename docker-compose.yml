services:
  opensearch-1:
    image: opensearchproject/opensearch:2.19.5
    container_name: opensearch-1
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-1
      - discovery.seed_hosts=opensearch-1,opensearch-2
      - cluster.initial_cluster_manager_nodes=opensearch-1,opensearch-2
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data-1:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  opensearch-2:
    image: opensearchproject/opensearch:2.19.5
    container_name: opensearch-2
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-2
      - discovery.seed_hosts=opensearch-1,opensearch-2
      - cluster.initial_cluster_manager_nodes=opensearch-1,opensearch-2
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data-2:/usr/share/opensearch/data
    ports:
      - "9201:9200"
      - "9601:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  fluent-bit:
    image: fluent/fluent-bit:5.0
    container_name: fluent-bit
    volumes:
      - ./conf/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - /var/log/syslog:/var/log/syslog:ro
      - /var/log/kern.log:/var/log/kern.log:ro
      - fluent-bit-db:/fluent-bit/db
    environment:
      - HOSTNAME
    depends_on:
      opensearch-1:
        condition: service_healthy
      opensearch-2:
        condition: service_healthy
    restart: unless-stopped

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.5
    container_name: opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch-1:9200","http://opensearch-2:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch-1:
        condition: service_healthy
      opensearch-2:
        condition: service_healthy

volumes:
  opensearch-data-1:
  opensearch-data-2:
  fluent-bit-db:

